# ===============================
# Application
# ===============================
spring.application.name=CauLongVui
server.port=8080
spring.config.import=optional:file:./application-secrets.properties

# ===============================
# SQL Server DataSource Configuration
# Sensitive username/password are in application-secrets.properties.
# ===============================
spring.datasource.url=jdbc:sqlserver://caulongvui-db.c3km8wawc7gx.ap-southeast-1.rds.amazonaws.com:1433;databaseName=caulongvui;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=false;
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.use_nationalized_character_data=false

# ===============================
# Static resources
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ===============================
# Email Notifications (AWS SES)
# Values can be overridden in application-secrets.properties.
# AWS credentials are loaded by the AWS SDK default chain.
# ===============================
app.base-url=http://localhost:8080
app.mail.enabled=false
app.mail.from=Cau Long Vui <no-reply@example.com>
app.mail.ses.region=ap-southeast-1
app.mail.booking-reminder-hours=12

# ===============================
# MoMo Sandbox Payment Config
# Sensitive partner/access/secret keys are in application-secrets.properties.
# ===============================
momo.api-url=https://test-payment.momo.vn/v2/gateway/api/create
momo.partner-code=MOMO
momo.access-key=CHANGE_ME
momo.secret-key=CHANGE_ME
momo.return-url=http://localhost:8080/api/payment/momo-return
momo.notify-url=http://localhost:8080/api/payment/momo-notify
momo.request-type=captureWallet

# ===============================
# VNPay Sandbox Payment Config
# Sensitive tmnCode/hashSecret are in application-secrets.properties.
# ===============================
vnpay.tmnCode=CHANGE_ME
vnpay.hashSecret=CHANGE_ME
vnpay.baseUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/api/payment/vnpay-return
vnpay.version=2.1.0
vnpay.command=pay

# ===============================
# RSocket Configuration
# ===============================
spring.rsocket.server.port=7000
spring.rsocket.server.transport=websocket
spring.rsocket.server.mapping-path=/rsocket

# ===============================
# AWS Cognito + Google Login
# Sensitive client id/secret and issuer are in application-secrets.properties.
# Callback URL:
# http://localhost:8080/login/oauth2/code/cognito
# ===============================
