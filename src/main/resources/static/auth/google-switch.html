<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chon tai khoan Google - Cau Long Vui</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/shared.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .switch-box {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 28px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    .switch-box h1 {
      font-size: 22px;
      margin-bottom: 10px;
      color: var(--dark);
    }

    .switch-box p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
  <script src="/config.js"></script>
</head>

<body>
  <div class="switch-box">
    <h1>Dang mo Google...</h1>
    <p>He thong dang lam moi phien dang nhap de ban co the chon tai khoan.</p>
  </div>

  <script>
    localStorage.removeItem('currentUser');
    setTimeout(() => {
      window.location.href = '/oauth2/authorization/cognito';
    }, 250);
  </script>
</body>

</html>
