<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quen mat khau - Cau Long Vui</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/shared.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }

    .auth-card {
      width: min(440px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 30px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 8px;
      color: var(--dark);
    }

    .lead {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--mid);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 13px 15px;
      font-size: 15px;
      font-family: var(--font-main);
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-glow);
    }

    .btn-auth {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-main);
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-auth:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .message {
      display: none;
      border-radius: var(--r-sm);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: #fee2e2;
      border: 1px solid rgba(224, 58, 58, 0.3);
      color: var(--red);
    }

    .message.success {
      background: #ecfdf3;
      border: 1px solid #bbf7d0;
      color: #166534;
    }

    .reset-panel {
      display: none;
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }

    .reset-panel.show {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .back-link a {
      color: var(--green);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
  <script src="/config.js"></script>
</head>

<body>
  <main class="auth-card">
    <h1>Quen mat khau</h1>
    <p class="lead">Nhap email tai khoan Cognito cua ban. He thong se gui ma xac nhan ve email de dat lai mat khau.</p>

    <div class="message" id="messageBox"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="ban@email.com" required />
      </div>
      <button type="submit" class="btn-auth" id="sendCodeBtn">Gui ma xac nhan</button>
    </form>

    <section class="reset-panel" id="resetPanel">
      <form id="resetForm">
        <div class="form-group">
          <label for="confirmationCode">Ma xac nhan</label>
          <input type="text" id="confirmationCode" autocomplete="one-time-code" placeholder="Nhap ma trong email" required />
        </div>
        <div class="form-group">
          <label for="newPassword">Mat khau moi</label>
          <input type="password" id="newPassword" autocomplete="new-password" placeholder="Toi thieu 6 ky tu" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Xac nhan mat khau moi</label>
          <input type="password" id="confirmPassword" autocomplete="new-password" placeholder="Nhap lai mat khau moi" required />
        </div>
        <button type="submit" class="btn-auth" id="resetBtn">Dat lai mat khau</button>
      </form>
    </section>

    <div class="back-link">
      <a href="/auth/login.html">Quay lai dang nhap</a>
    </div>
  </main>

  <script>
    const forgotForm = document.getElementById('forgotForm');
    const resetForm = document.getElementById('resetForm');
    const resetPanel = document.getElementById('resetPanel');
    const messageBox = document.getElementById('messageBox');
    const sendCodeBtn = document.getElementById('sendCodeBtn');
    const resetBtn = document.getElementById('resetBtn');

    function showMessage(type, text) {
      messageBox.className = 'message show ' + type;
      messageBox.textContent = text;
    }

    async function parseResponse(res) {
      const json = await res.json();
      if (!res.ok || !json.success) {
        throw new Error(json.message || 'Co loi xay ra. Vui long thu lai.');
      }
      return json;
    }

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return showMessage('error', 'Vui long nhap email.');

      sendCodeBtn.disabled = true;
      sendCodeBtn.textContent = 'Dang gui...';

      try {
        const res = await fetch((window.APP_CONFIG?.apiBase??'')+'/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const json = await parseResponse(res);
        showMessage('success', json.message || 'Ma xac nhan da duoc gui.');
        resetPanel.classList.add('show');
      } catch (err) {
        showMessage('error', err.message);
      } finally {
        sendCodeBtn.disabled = false;
        sendCodeBtn.textContent = 'Gui ma xac nhan';
      }
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const confirmationCode = document.getElementById('confirmationCode').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 6) return showMessage('error', 'Mat khau moi toi thieu 6 ky tu.');
      if (newPassword !== confirmPassword) return showMessage('error', 'Mat khau xac nhan khong khop.');

      resetBtn.disabled = true;
      resetBtn.textContent = 'Dang dat lai...';

      try {
        const res = await fetch((window.APP_CONFIG?.apiBase??'')+'/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, confirmationCode, newPassword })
        });
        const json = await parseResponse(res);
        showMessage('success', json.message || 'Dat lai mat khau thanh cong.');
        setTimeout(() => window.location.href = '/auth/login.html', 1400);
      } catch (err) {
        showMessage('error', err.message);
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Dat lai mat khau';
      }
    });
  </script>
</body>

</html>
